<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대장아파트 시세 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #a855f7;
    --green: #10d06e;
    --red: #ff4757;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,23,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-stats {
    display: flex;
    gap: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .header-stat span { color: var(--accent); font-weight: 700; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    min-height: calc(100vh - 60px);
  }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* Search */
  .search-wrap {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* Region filters */
  .filter-wrap {
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { 
    background: rgba(0,212,255,0.1); 
    border-color: var(--accent); 
    color: var(--accent);
    font-weight: 700;
  }

  /* Apt list */
  .apt-list {
    overflow-y: auto;
    max-height: calc(100vh - 280px);
  }

  .apt-list::-webkit-scrollbar { width: 4px; }
  .apt-list::-webkit-scrollbar-track { background: transparent; }
  .apt-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .apt-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .apt-item:hover { background: var(--surface2); }
  .apt-item.active { 
    background: rgba(0,212,255,0.08); 
    border-left: 2px solid var(--accent);
  }

  .apt-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .apt-item-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .apt-item-area {
    font-size: 11px;
    color: var(--text-muted);
  }

  .apt-item-price {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .apt-item-change {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
  }

  .change-up { color: var(--red); }
  .change-down { color: var(--green); }
  .change-flat { color: var(--text-muted); }

  /* Main content */
  .main {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Apt detail header */
  .apt-detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .apt-detail-info h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 6px;
  }

  .apt-detail-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .tag-region { background: rgba(168,85,247,0.15); color: var(--accent3); border: 1px solid rgba(168,85,247,0.3); }
  .tag-area { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .tag-size { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.2); }

  .apt-detail-metrics {
    display: flex;
    gap: 24px;
    flex-shrink: 0;
  }

  .metric {
    text-align: right;
  }

  .metric-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .metric-value.jeonse { color: #f59e0b; }

  .metric-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    margin-top: 2px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .stat-card-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .stat-card-value {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Chart */
  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    flex: 1;
  }

  .chart-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
  }

  .chart-legend {
    display: flex;
    gap: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  /* Table */
  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    font-size: 11px;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    color: var(--text);
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,0.03); }

  .td-매매 { color: var(--accent); }
  .td-전세 { color: #f59e0b; }
  .td-gap { color: var(--text-dim); }
  .td-date { color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; }

  /* Table scroll container */
  .table-scroll { max-height: 220px; overflow-y: auto; }
  .table-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border); }

  /* Ranking table */
  .ranking-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .rank-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
  }

  .rank-row:hover { background: var(--surface2); }
  .rank-row:last-child { border-bottom: none; }

  .rank-num {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    width: 24px;
    text-align: center;
    color: var(--text-muted);
  }

  .rank-num.top3 { color: var(--accent); }

  .rank-name {
    flex: 1;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rank-price {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
  }

  .rank-area {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    min-width: 60px;
  }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }

  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* Responsive */
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { max-height: 300px; }
    .apt-list { max-height: 200px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .apt-detail-header { flex-direction: column; }
    .apt-detail-metrics { flex-direction: row; justify-content: flex-start; }
    .metric { text-align: left; }
  }

  .pulse {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 6px;
  }

  /* ===== 업데이트 모달 ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 0 40px rgba(0,212,255,0.18);
  }
  .modal-title {
    font-size: 16px; font-weight: 700; color: var(--accent);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .modal-apt-name {
    font-size: 13px; color: var(--text-dim);
    background: var(--surface2); border-radius: 6px;
    padding: 8px 12px; margin-bottom: 16px;
    border-left: 3px solid var(--accent);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .form-group input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 8px 12px;
    font-family: 'Space Mono', monospace; transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .form-hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: var(--accent); color: #000; border: none;
    border-radius: 6px; padding: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    background: var(--surface2); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 18px; font-size: 13px; cursor: pointer;
  }
  .btn-update {
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--accent); border-radius: 6px; padding: 6px 14px;
    font-size: 12px; cursor: pointer; display: inline-flex;
    align-items: center; gap: 5px; transition: background 0.2s; margin-left: 8px;
  }
  .btn-update:hover { background: rgba(0,212,255,0.1); }
  .user-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; background: rgba(168,85,247,0.2);
    color: var(--accent3); border-radius: 4px; padding: 1px 6px; margin-left: 4px;
  }
  tr.user-row td { background: rgba(168,85,247,0.07); }
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--surface); border: 1px solid var(--accent);
    color: var(--text); padding: 12px 20px; border-radius: 8px;
    font-size: 13px; z-index: 2000;
    transform: translateY(80px); opacity: 0; transition: all 0.3s;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .clear-link {
    font-size: 11px; color: var(--red); cursor: pointer;
    text-decoration: underline; background: none;
    border: none; padding: 0; margin-left: 12px; opacity: 0.7;
  }
  .clear-link:hover { opacity: 1; }
  .user-notice {
    padding: 6px 0 4px;
    font-size: 11px; color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <h1>대장아파트 시세 트래커</h1>
  </div>
  <div class="header-stats">
    <div><span id="totalCount">36</span>개 아파트</div>
    <div><span id="regionCount">5</span>개 권역</div>
    <div><span class="live-dot pulse"></span>DATA 2021~2023</div>
  </div>
</header>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 아파트명, 지역으로 검색...">
      </div>
      <div class="filter-wrap" id="regionFilters">
        <button class="filter-btn active" data-region="all">전체</button>
        <button class="filter-btn" data-region="경남권">경남권</button>
        <button class="filter-btn" data-region="경북권">경북권</button>
        <button class="filter-btn" data-region="기타권">기타권</button>
        <button class="filter-btn" data-region="수도권">수도권</button>
        <button class="filter-btn" data-region="전라권">전라권</button>
      </div>
      <div class="apt-list" id="aptList"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="mainContent">
    <!-- Default: ranking view -->
    <div id="rankingView">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">📊 전국 최신 매매가 순위</span>
          <span style="font-size:11px;color:var(--text-muted);">단위: 만원</span>
        </div>
        <div class="rank-row" style="background:var(--surface2);cursor:default;">
          <div class="rank-num" style="color:var(--text-muted);font-size:10px;">순위</div>
          <div class="rank-name" style="color:var(--text-muted);font-size:11px;">아파트</div>
          <div class="rank-price" style="color:var(--text-muted);font-size:11px;">매매가</div>
          <div class="rank-area" style="color:var(--text-muted);font-size:11px;">지역</div>
        </div>
        <div id="rankingList"></div>
      </div>
    </div>

    <!-- Detail view (hidden initially) -->
    <div id="detailView" style="display:none;">
      <div class="apt-detail-header" id="aptDetailHeader">
        <div class="apt-detail-info">
          <h2 id="detailName">아파트명</h2>
          <div class="apt-detail-tags" id="detailTags"></div>
        </div>
        <div class="apt-detail-metrics" id="detailMetrics"></div>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <div class="chart-panel">
        <div class="chart-controls">
          <div class="chart-title">📈 매매가 · 전세가 시계열 추이</div>
          <div class="chart-legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:var(--accent)"></div>
              매매가
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#f59e0b"></div>
              전세가
            </div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <div class="table-panel">
        <div class="panel-header">
          <span class="panel-title">📋 기간별 상세 데이터</span>
          <span style="font-size:11px;color:var(--text-muted);">단위: 만원</span>
        </div>
        <div class="table-wrap">
          <div class="table-scroll" id="tableScroll">
            <table id="priceTable">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>매매가</th>
                  <th>전세가</th>
                  <th>갭 (매매-전세)</th>
                  <th>전세가율</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

// ===== localStorage 기반 사용자 입력 관리 =====
const STORAGE_KEY = 'apt_tracker_v1';

function loadUserData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveUserData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

function getUserEntries(apt) {
  const d = loadUserData();
  return d[apt.name] || {};
}

function applyUserData(apt) {
  const entries = getUserEntries(apt);
  const userDates = Object.keys(entries);
  if (!userDates.length) return { ...apt, _userDates: [] };
  const merged = {
    ...apt,
    '매매': { ...apt['매매'] },
    '전세': { ...apt['전세'] },
    _userDates: userDates
  };
  userDates.forEach(date => {
    const v = entries[date];
    if (v.maemae) merged['매매'][date] = v.maemae;
    if (v.jeonse) merged['전세'][date] = v.jeonse;
  });
  return merged;
}

// ===== 토스트 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== 모달 =====
function openUpdateModal() {
  if (!currentApt) return;
  document.getElementById('modalAptName').textContent = currentApt.name;
  document.getElementById('inputDate').value = '';
  document.getElementById('inputMaemae').value = '';
  document.getElementById('inputJeonse').value = '';
  document.getElementById('inputMemo').value = '';
  document.getElementById('updateModal').classList.add('open');
  setTimeout(() => document.getElementById('inputDate').focus(), 100);
}
function closeUpdateModal() {
  document.getElementById('updateModal').classList.remove('open');
}
function saveEntry() {
  const date = document.getElementById('inputDate').value.trim();
  const maemae = parseInt(document.getElementById('inputMaemae').value);
  const jeonse = parseInt(document.getElementById('inputJeonse').value) || null;
  const memo = document.getElementById('inputMemo').value.trim() || null;

  if (!date) { showToast('⚠️ 날짜를 입력해주세요'); return; }
  if (!/^\d{1,2}월-\d{2}$/.test(date)) { showToast('⚠️ 형식: 3월-01'); return; }
  if (!maemae || maemae < 1000) { showToast('⚠️ 매매가 확인 (단위: 만원)'); return; }

  const d = loadUserData();
  if (!d[currentApt.name]) d[currentApt.name] = {};
  d[currentApt.name][date] = { maemae, jeonse, memo, at: new Date().toLocaleDateString('ko-KR') };
  saveUserData(d);

  closeUpdateModal();
  showToast('✅ ' + date + ' 저장 완료!');
  selectApt(currentApt);
}
function clearMyData() {
  if (!currentApt) return;
  if (!confirm(currentApt.name + '\n내가 입력한 데이터를 모두 삭제할까요?')) return;
  const d = loadUserData();
  delete d[currentApt.name];
  saveUserData(d);
  showToast('🗑️ 초기화 완료');
  selectApt(currentApt);
}

// 모달 이벤트
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('modalCancelBtn').addEventListener('click', closeUpdateModal);
  document.getElementById('modalSaveBtn').addEventListener('click', saveEntry);
  document.getElementById('updateModal').addEventListener('click', function(e) {
    if (e.target === this) closeUpdateModal();
  });
});

function fmt(v) {
  if (!v && v !== 0) return '-';
  return (v/10000).toFixed(2) + '억';
}

function fmtShort(v) {
  if (!v && v !== 0) return '-';
  return Math.round(v/1000) + '천만';
}

function getLatestPrice(apt, type) {
  const entries = Object.entries(apt[type]);
  if (!entries.length) return null;
  return entries[entries.length-1][1];
}

function getFirstPrice(apt, type) {
  const entries = Object.entries(apt[type]);
  if (!entries.length) return null;
  return entries[0][1];
}

function getChange(apt, type) {
  const first = getFirstPrice(apt, type);
  const last = getLatestPrice(apt, type);
  if (!first || !last) return null;
  return ((last - first) / first * 100).toFixed(1);
}

function renderAptList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  filteredData = DATA.filter(a => {
    const matchRegion = activeRegion === 'all' || a.region === activeRegion;
    const matchSearch = !search || a.name.toLowerCase().includes(search) || a.area.includes(search) || a.region.includes(search);
    return matchRegion && matchSearch;
  });

  const list = document.getElementById('aptList');
  list.innerHTML = '';

  filteredData.forEach((apt, i) => {
    const latestPrice = getLatestPrice(apt, '매매');
    const change = getChange(apt, '매매');
    const changeClass = change > 0 ? 'change-up' : change < 0 ? 'change-down' : 'change-flat';
    const changeSign = change > 0 ? '▲' : change < 0 ? '▼' : '→';

    const div = document.createElement('div');
    div.className = 'apt-item' + (currentApt === apt ? ' active' : '');
    div.innerHTML = `
      <div class="apt-item-name">${apt.name}</div>
      <div class="apt-item-meta">
        <span class="apt-item-area">${apt.region} · ${apt.area}</span>
        <span class="apt-item-price">${latestPrice ? (latestPrice/10000).toFixed(1)+'억' : '-'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:10px;color:var(--text-muted);">${apt.size}</span>
        <span class="apt-item-change ${changeClass}">${changeSign}${Math.abs(change||0)}%</span>
      </div>
    `;
    div.onclick = () => selectApt(apt);
    list.appendChild(div);
  });
}

      <div class="metric-value jeonse">${(latestJeonse/10000).toFixed(2)}억</div>
    </div>` : ''}
    ${gap ? `<div class="metric">
      <div class="metric-label">갭 투자금액</div>
      <div class="metric-value" style="color:var(--accent2)">${(gap/10000).toFixed(2)}억</div>
    </div>` : ''}
    ${jeonseRate ? `<div class="metric">
      <div class="metric-label">전세가율</div>
      <div class="metric-value" style="color:var(--green)">${jeonseRate}%</div>
    </div>` : ''}
  `;

  // Stats
  const maemaeVals = Object.values(apt['매매']);
  const maxM = Math.max(...maemaeVals);
  const minM = Math.min(...maemaeVals);
  const avgM = maemaeVals.reduce((a,b)=>a+b,0)/maemaeVals.length;
  const changeM = getChange(apt, '매매');

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">🔺 최고 매매가</div>
      <div class="stat-card-value" style="color:var(--red)">${(maxM/10000).toFixed(1)}억</div>
      <div class="stat-card-sub">${Math.round(maxM/1000)}천만원</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">🔻 최저 매매가</div>
      <div class="stat-card-value" style="color:var(--green)">${(minM/10000).toFixed(1)}억</div>
      <div class="stat-card-sub">${Math.round(minM/1000)}천만원</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">📊 평균 매매가</div>
      <div class="stat-card-value">${(avgM/10000).toFixed(1)}억</div>
      <div class="stat-card-sub">${Math.round(avgM/1000)}천만원</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">📈 전체 변동률</div>
      <div class="stat-card-value" style="color:${changeM>0?'var(--red)':changeM<0?'var(--green)':'var(--text)'}">${changeM>0?'+':''}${changeM}%</div>
      <div class="stat-card-sub">${Object.keys(apt['매매']).length}개 기간</div>
    </div>
  `;

  // Chart
  renderChart(apt);
  
  // Table
  renderTable(apt);
}

function renderChart(apt) {
  if (chart) { chart.destroy(); chart = null; }

  // Sort dates (월별 정렬)
  const monthOrder = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  
  const maemaeEntries = Object.entries(apt['매매']).sort((a,b) => {
    const [am, aw] = a[0].split('-');
    const [bm, bw] = b[0].split('-');
    const ai = monthOrder.indexOf(am);
    const bi = monthOrder.indexOf(bm);
    return ai !== bi ? ai - bi : parseInt(aw) - parseInt(bw);
  });

  const jeonseEntries = Object.entries(apt['전세']).sort((a,b) => {
    const [am, aw] = a[0].split('-');
    const [bm, bw] = b[0].split('-');
    const ai = monthOrder.indexOf(am);
    const bi = monthOrder.indexOf(bm);
    return ai !== bi ? ai - bi : parseInt(aw) - parseInt(bw);
  });

  const labels = maemaeEntries.map(e => e[0]);
  const maemaeData = maemaeEntries.map(e => e[1]/10000);
  
  // match jeonse to same labels
  const jeonseMap = Object.fromEntries(jeonseEntries);
  const jeonseData = labels.map(l => jeonseMap[l] ? jeonseMap[l]/10000 : null);

  const ctx = document.getElementById('priceChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '매매가',
          data: maemaeData,
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.08)',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5,
          pointBackgroundColor: '#00d4ff',
        },
        {
          label: '전세가',
          data: jeonseData,
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.06)',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5,
          pointBackgroundColor: '#f59e0b',
          spanGaps: true,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111827',
          borderColor: '#1e2d45',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y ? ctx.parsed.y.toFixed(2)+'억' : '-'}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,45,69,0.5)', drawBorder: false },
          ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 12 }
        },
        y: {
          grid: { color: 'rgba(30,45,69,0.5)', drawBorder: false },
          ticks: { 
            color: '#64748b', 
            font: { size: 10, family: "'Space Mono', monospace" },
            callback: v => v+'억'
          }
        }
      }
    }
  });
}

function renderTable(apt) {
  const monthOrder = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  
  const allDates = new Set([...Object.keys(apt['매매']), ...Object.keys(apt['전세'])]);
  const sorted = [...allDates].sort((a, b) => {
    const [am, aw] = a.split('-');
    const [bm, bw] = b.split('-');
    const ai = monthOrder.indexOf(am);
    const bi = monthOrder.indexOf(bm);
    return ai !== bi ? ai - bi : parseInt(aw) - parseInt(bw);
  });

  const tbody = document.getElementById('tableBody');
  const userDates = apt._userDates || [];
  const hasUser = userDates.length > 0;

  // 사용자 데이터 안내 + 초기화 버튼
  let noticeEl = document.getElementById('userNotice');
  if (!noticeEl) {
    noticeEl = document.createElement('div');
    noticeEl.id = 'userNotice';
    noticeEl.className = 'user-notice';
    tbody.parentElement.parentElement.insertBefore(noticeEl, tbody.parentElement);
  }
  noticeEl.innerHTML = hasUser
    ? '<span style="color:var(--accent3)">🟣 보라색 행 = 내가 입력한 데이터</span>'
      + '<button class="clear-link" onclick="clearMyData()">초기화</button>'
    : '';

  tbody.innerHTML = sorted.reverse().map(date => {
    const m = apt['매매'][date];
    const j = apt['전세'][date];
    const gap = m && j ? m - j : null;
    const rate = m && j ? (j/m*100).toFixed(1) : null;
    const isUser = userDates.includes(date);
    const rowCls = isUser ? ' class="user-row"' : '';
    const badge = isUser ? '<span class="user-badge">✏️</span>' : '';
    return `<tr${rowCls}>
      <td class="td-date">${date}${badge}</td>
      <td class="td-매매">${m ? (m/10000).toFixed(2)+'억' : '-'}</td>
      <td class="td-전세">${j ? (j/10000).toFixed(2)+'억' : '-'}</td>
      <td class="td-gap">${gap ? (gap/10000).toFixed(2)+'억' : '-'}</td>
      <td style="color:${rate>60?'var(--green)':rate>40?'var(--text-dim)':'var(--red)'}">${rate ? rate+'%' : '-'}</td>
    </tr>`;
  }).join('');
}

function renderRanking() {
  const sorted = [...DATA].sort((a, b) => {
    const ap = getLatestPrice(a, '매매') || 0;
    const bp = getLatestPrice(b, '매매') || 0;
    return bp - ap;
  });

  document.getElementById('rankingList').innerHTML = sorted.map((apt, i) => {
    const price = getLatestPrice(apt, '매매');
    const change = getChange(apt, '매매');
    const changeClass = change > 0 ? 'change-up' : change < 0 ? 'change-down' : 'change-flat';
    return `<div class="rank-row" onclick="selectApt(DATA.find(a=>a.name===\`${apt.name.replace(/`/g,'\\`')}\`))">
      <div class="rank-num ${i<3?'top3'?'':{class:''}:''}">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div class="rank-name">${apt.name}</div>
        <div style="font-size:10px;color:var(--text-muted);">${apt.region} · ${apt.size}</div>
      </div>
      <div style="text-align:right">
        <div class="rank-price">${price ? (price/10000).toFixed(1)+'억' : '-'}</div>
        <div class="apt-item-change ${changeClass}" style="font-size:10px;">${change>0?'▲':'▼'}${Math.abs(change)}%</div>
      </div>
    </div>`;
  }).join('');
}

// Init
document.getElementById('searchInput').addEventListener('input', renderAptList);

document.getElementById('regionFilters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeRegion = e.target.dataset.region;
    currentApt = null;
    document.getElementById('rankingView').style.display = 'block';
    document.getElementById('detailView').style.display = 'none';
    renderAptList();
  }
});

renderAptList();
renderRanking();
</script>

    <div class="form-row">
      <div class="form-group">

      <div class="form-group">
        <label>💰 매매가 (만원)</label>

        <div class="form-hint">15억 → 150000 입력</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">

      </div>
      <div class="form-group">
        <label>📝 메모 (선택)</label>

      </div>
