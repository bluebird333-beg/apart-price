<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대장아파트 시세 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e6ea;
    --accent: #2563eb;
    --accent2: #f97316;
    --accent3: #7c3aed;
    --green: #16a34a;
    --red: #dc2626;
    --text: #1e293b;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow);
    gap: 8px;
  }
  .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logo-icon { font-size: 20px; }
  header h1 { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-stats { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); align-items: center; }
  .header-stats span { color: var(--accent); font-weight: 600; }
  .header-stat-item { white-space: nowrap; }
  .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-header {
    padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
    display: flex; align-items: center; gap: 4px; white-space: nowrap;
  }
  .btn-export { background: var(--surface2); color: var(--text-dim); }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }
  .btn-import { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-import:hover { background: #1d4ed8; }
  #importFileInput { display: none; }
  @media (max-width: 640px) {
    .header-stats { display: none; }
    header h1 { font-size: 13px; }
    .btn-header { padding: 5px 8px; font-size: 11px; }
    .btn-label { display: none; }
  }

  .container {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-size: 13px; font-weight: 700; color: var(--text); }

  /* 사이드바 */
  .sidebar { position: sticky; top: 72px; height: calc(100vh - 88px); display: flex; flex-direction: column; }
  .search-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
  .search-input {
    width: 100%; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text);
    transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filter-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim);
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .apt-list { overflow-y: auto; flex: 1; }
  .apt-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .apt-item:hover { background: var(--surface2); }
  .apt-item.active { background: #eff6ff; border-left: 3px solid var(--accent); }
  .apt-item-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .apt-item-meta { display: flex; justify-content: space-between; align-items: center; }
  .apt-item-area { font-size: 10px; color: var(--text-muted); }
  .apt-item-price { font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'Space Mono', monospace; }
  .apt-item-change { font-size: 10px; font-weight: 600; }
  .change-up { color: var(--red); }
  .change-down { color: var(--green); }
  .change-flat { color: var(--text-muted); }

  /* 메인 */
  .main { display: flex; flex-direction: column; gap: 16px; }

  /* 랭킹 */
  .rank-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .rank-row:hover { background: var(--surface2); }
  .rank-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); color: var(--text-dim); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .rank-num.top3 { background: var(--accent); color: white; }
  .rank-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .rank-price { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'Space Mono', monospace; }
  .rank-unit { font-size: 10px; color: var(--text-muted); text-align: right; padding: 10px 16px; }

  /* 상세 */
  #detailView { display: none; }
  .apt-detail-header { padding: 20px; border-bottom: 1px solid var(--border); }
  .apt-detail-name { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .apt-detail-tags { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .tag-region { background: #dbeafe; color: #1d4ed8; }
  .tag-area { background: #ede9fe; color: #6d28d9; }
  .tag-size { background: #dcfce7; color: #15803d; }
  .apt-detail-metrics {
    display: flex; gap: 24px; padding: 16px 20px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--accent); }
  .metric-value.jeonse { color: var(--accent2); }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  .stat-card {
    background: var(--surface2); border-radius: 8px; padding: 14px;
    border: 1px solid var(--border);
  }
  .stat-card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-card-value { font-size: 18px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .chart-wrap { padding: 16px; height: 300px; position: relative; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); color: var(--text-dim); font-size: 11px; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .td-date { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .td-매매 { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); }
  .td-전세 { font-family: 'Space Mono', monospace; color: var(--accent2); }
  .td-gap { font-family: 'Space Mono', monospace; color: var(--text-dim); }
  tr.user-row td { background: #faf5ff; }
  tr.user-row td:first-child { border-left: 3px solid var(--accent3); }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 500px; max-width: 95vw;
    box-shadow: var(--shadow-md);
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .modal-apt-name {
    font-size: 13px; color: var(--text-dim); background: var(--surface2);
    border-radius: 6px; padding: 8px 12px; margin-bottom: 18px;
    border-left: 3px solid var(--accent);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
  .form-group input, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-save:hover { background: #1d4ed8; }
  .btn-cancel {
    background: var(--surface2); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 18px; font-size: 13px; cursor: pointer;
  }
  .btn-update {
    background: var(--surface2); border: 1px solid var(--accent); color: var(--accent);
    border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; margin-left: 8px;
  }
  .btn-update:hover { background: #eff6ff; }
  .user-badge {
    display: inline-flex; align-items: center; gap: 3px; font-size: 10px;
    background: #ede9fe; color: var(--accent3); border-radius: 4px;
    padding: 1px 5px; margin-left: 4px;
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 13px; z-index: 2000;
    transform: translateY(60px); opacity: 0; transition: all 0.3s;
    box-shadow: var(--shadow-md);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .clear-link {
    font-size: 11px; color: var(--red); cursor: pointer;
    text-decoration: underline; background: none; border: none; margin-left: 12px;
  }
  .user-notice { padding: 8px 16px; font-size: 11px; color: var(--text-muted); background: #faf5ff; border-bottom: 1px solid var(--border); }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; max-height: 320px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .apt-detail-metrics { gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <h1>대장아파트 시세 트래커</h1>
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="header-stat-item"><span id="totalCount">36</span>개 아파트</div>
      <div class="header-stat-item"><span id="regionCount">5</span>개 권역</div>
      <div class="header-stat-item">DATA <span>2021~2023</span></div>
    </div>
    <div class="header-btns">
      <button class="btn-header btn-export" onclick="exportData()">📤 <span class="btn-label">내보내기</span></button>
      <button class="btn-header btn-import" onclick="document.getElementById('importFileInput').click()">📥 <span class="btn-label">가져오기</span></button>
      <button class="btn-header" style="background:#16a34a;color:#fff;border-color:#16a34a;" onclick="openAddAptModal()">🏢 <span class="btn-label">아파트 추가</span></button>
      <input type="file" id="importFileInput" accept=".json" onchange="importData(event)">
    </div>
  </div>
</header>

<div class="container">
  <div class="sidebar panel">
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 아파트명, 지역 검색...">
    </div>
    <div class="filter-wrap" id="regionFilters">
      <button class="filter-btn active" data-region="all">전체</button>
      <button class="filter-btn" data-region="경남권">경남권</button>
      <button class="filter-btn" data-region="경북권">경북권</button>
      <button class="filter-btn" data-region="기타권">기타권</button>
      <button class="filter-btn" data-region="수도권">수도권</button>
      <button class="filter-btn" data-region="전라권">전라권</button>
    </div>
    <div class="apt-list" id="aptList"></div>
  </div>

  <div class="main">
    <div id="rankingView" class="panel">
      <div class="panel-header">
        <span class="panel-title">📊 전국 최신 매매가 순위</span>
        <span class="rank-unit">단위: 만원</span>
      </div>
      <div id="rankingList"></div>
    </div>

    <div id="detailView">
      <div class="panel">
        <div class="apt-detail-header">
          <div class="apt-detail-name" id="detailName"></div>
          <div class="apt-detail-tags" id="detailTags"></div>
        </div>
        <div class="apt-detail-metrics" id="detailMetrics"></div>
        <div class="stats-row" id="statsRow"></div>
        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">📋 기간별 상세 데이터</span>
        </div>
        <div id="userNoticeWrap"></div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>매매가</th>
                <th>전세가</th>
                <th>갭</th>
                <th>전세가율</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="updateModal">
  <div class="modal-box">
    <div class="modal-title">✏️ 실거래가 추가</div>
    <div class="modal-apt-name" id="modalAptName"></div>
    <div class="form-row">
      <div class="form-group">
        <label>📅 연도</label>
        <select id="inputYear">
          <option value="2021">2021년</option>
          <option value="2022">2022년</option>
          <option value="2023">2023년</option>
          <option value="2024">2024년</option>
          <option value="2025">2025년</option>
          <option value="2026" selected>2026년</option>
          <option value="2027">2027년</option>
          <option value="2028">2028년</option>
          <option value="2029">2029년</option>
          <option value="2030">2030년</option>
          <option value="2031">2031년</option>
          <option value="2032">2032년</option>
          <option value="2033">2033년</option>
          <option value="2034">2034년</option>
          <option value="2035">2035년</option>
          <option value="2036">2036년</option>
          <option value="2037">2037년</option>
          <option value="2038">2038년</option>
          <option value="2039">2039년</option>
          <option value="2040">2040년</option>
        </select>
      </div>
      <div class="form-group">
        <label>📅 월-주차</label>
        <input type="text" id="inputDate" placeholder="예: 3월-01" />
        <div class="form-hint">형식: 월-주차 (예: 3월-01)</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>💰 매매가 (만원)</label>
        <input type="number" id="inputMaemae" placeholder="예: 150000" />
        <div class="form-hint">15억 → 150000</div>
      </div>
      <div class="form-group">
        <label>🏠 전세가 (만원, 선택)</label>
        <input type="number" id="inputJeonse" placeholder="없으면 비워두세요" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1;">
        <label>📝 메모 (선택)</label>
        <input type="text" id="inputMemo" placeholder="예: 실거래 확인" />
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modalCancelBtn">취소</button>
      <button class="btn-save" id="modalSaveBtn">💾 저장</button>
    </div>
  </div>
</div>
<!-- 아파트 추가 모달 -->
<div class="modal-overlay" id="addAptModal">
  <div class="modal-box">
    <div class="modal-title">🏢 새 아파트 추가</div>
    <div class="form-row">
      <div class="form-group">
        <label>🗺️ 권역</label>
        <select id="newAptRegion">
          <option value="수도권">수도권</option>
          <option value="경남권">경남권</option>
          <option value="경북권">경북권</option>
          <option value="기타권">기타권</option>
          <option value="전라권">전라권</option>
        </select>
      </div>
      <div class="form-group">
        <label>📍 지역 (예: 부산해운대(40))</label>
        <input type="text" id="newAptArea" placeholder="예: 부산해운대(40)" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1;">
        <label>🏠 아파트명 (예: 중동 해운대롯데캐슬스타 (2020년 9월 / 828세대))</label>
        <input type="text" id="newAptName" placeholder="아파트명 전체 입력" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📐 평형 (예: 35평)</label>
        <input type="text" id="newAptSize" placeholder="예: 34평" />
      </div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);padding:4px 0 8px;">
      💡 추가 후 아파트를 클릭하면 [✏️ 실거래가 추가]로 데이터를 입력할 수 있어요.
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="addAptCancelBtn">취소</button>
      <button class="btn-save" style="background:#16a34a;" id="addAptSaveBtn">🏢 추가하기</button>
    </div>
  </div>
</div>
<!-- 아파트 수정 모달 -->
<div class="modal-overlay" id="editAptModal">
  <div class="modal-box">
    <div class="modal-title">🏢 아파트 정보 수정</div>
    <div class="form-row">
      <div class="form-group">
        <label>🗺️ 권역</label>
        <select id="editAptRegion">
          <option value="수도권">수도권</option>
          <option value="경남권">경남권</option>
          <option value="경북권">경북권</option>
          <option value="기타권">기타권</option>
          <option value="전라권">전라권</option>
        </select>
      </div>
      <div class="form-group">
        <label>📍 지역</label>
        <input type="text" id="editAptArea" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1;">
        <label>🏠 아파트명</label>
        <input type="text" id="editAptName" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📐 평형</label>
        <input type="text" id="editAptSize" />
      </div>
    </div>

    console.warn('구글 시트 로드 실패, localStorage 사용:', e);
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e2) { return {}; }
  }
}

async function saveUserData(d) {
  // localStorage에 즉시 저장 (백업)
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  // 구글 시트에 비동기 저장
  try {
    await fetch(GS_URL, {
      method: 'POST',
      body: JSON.stringify(d),
      headers: { 'Content-Type': 'text/plain' }
    });
  } catch(e) {
    console.warn('구글 시트 저장 실패, localStorage만 저장됨:', e);
    showToast('⚠️ 네트워크 오류 - 로컬에만 저장됨');
  }
}

// 캐시된 데이터 (앱 시작 시 한 번 로드)
let _cachedUserData = {};

function applyUserData(apt) {
  const d = _cachedUserData;
  const entries = d[apt.name] || {};
  const userDates = Object.keys(entries).filter(k => !entries[k].deleted);
  const deletedDates = Object.keys(entries).filter(k => entries[k].deleted);
  if (!Object.keys(entries).length) return { ...apt, _userDates: [] };
  const merged = { ...apt, '매매': {...apt['매매']}, '전세': {...apt['전세']}, _userDates: userDates };
  userDates.forEach(k => {
    const v = entries[k];
    if (v.maemae) merged['매매'][k] = v.maemae;
    if (v.jeonse) merged['전세'][k] = v.jeonse;
  });
  // 삭제된 날짜는 데이터에서 제거
  deletedDates.forEach(k => {
    delete merged['매매'][k];
    delete merged['전세'][k];
  });
  return merged;
}

function openUpdateModal() {

}
function closeUpdateModal() { document.getElementById('updateModal').classList.remove('open'); }
async function saveEntry() {
  const year = document.getElementById('inputYear').value;
  const date = document.getElementById('inputDate').value.trim();
  const maemae = parseInt(document.getElementById('inputMaemae').value);
  const jeonse = parseInt(document.getElementById('inputJeonse').value) || null;
  const memo = document.getElementById('inputMemo').value.trim() || null;
  if (!date) { showToast('⚠️ 월-주차를 입력해주세요'); return; }
  if (!/^\d{1,2}월-\d{2}$/.test(date)) { showToast('⚠️ 형식: 3월-01'); return; }
  if (!maemae || maemae < 1000) { showToast('⚠️ 매매가 확인 (단위: 만원)'); return; }
  const key = year + '년_' + date;
  const d = _cachedUserData;
  if (!d[currentApt.name]) d[currentApt.name] = {};
  d[currentApt.name][key] = { maemae, jeonse, memo, at: new Date().toLocaleDateString('ko-KR') };
  closeUpdateModal();
  showToast('💾 저장 중...');
  await saveUserData(d);
  showToast('✅ ' + year + '년 ' + date + ' 저장 완료!');
  selectApt(currentApt);
}
function handleEdit(btn) {
  const aptName = decodeURIComponent(btn.dataset.apt);
  const dateKey = btn.dataset.date;
  editEntry(aptName, dateKey);
}
function handleDelete(btn) {
  const aptName = decodeURIComponent(btn.dataset.apt);
  const dateKey = btn.dataset.date;
  deleteEntry(aptName, dateKey);
}
function editEntryByIdx(idx, dateKey) { editEntry(DATA[idx].name, dateKey); }
function deleteEntryByIdx(idx, dateKey) { deleteEntry(DATA[idx].name, dateKey); }
async function editEntry(aptName, dateKey) {
  currentApt = DATA.find(a => a.name === aptName);
  if (!currentApt) return;

  // 기존 유저 데이터 또는 원본 데이터에서 현재 값 가져오기
  const d = _cachedUserData;
  const userEntry = d[aptName] && d[aptName][dateKey];
  const origMaemae = currentApt['매매'][dateKey] || '';
  const origJeonse = currentApt['전세'][dateKey] || '';

  // 연도와 월-주차 분리 (예: "2026년_3월-01" → "2026", "3월-01")
  const [yearPart, datePart] = dateKey.split('년_');
  document.getElementById('modalAptName').textContent = aptName;
  document.getElementById('inputYear').value = yearPart;
  document.getElementById('inputDate').value = datePart;
  document.getElementById('inputMaemae').value = userEntry ? (userEntry.maemae || origMaemae) : origMaemae;
  document.getElementById('inputJeonse').value = userEntry ? (userEntry.jeonse || origJeonse) : origJeonse;
  document.getElementById('inputMemo').value = userEntry ? (userEntry.memo || '') : '';
  document.getElementById('updateModal').classList.add('open');
}

async function deleteEntry(aptName, dateKey) {
  if (!confirm(`${fmtKey(dateKey)} 데이터를 삭제할까요?\n(원본 데이터도 이 기기에서 숨김 처리됩니다)`)) return;
  const d = _cachedUserData;
  if (!d[aptName]) d[aptName] = {};
  // 삭제 표시: maemae=0으로 저장해서 화면에서 숨김
  d[aptName][dateKey] = { maemae: null, jeonse: null, deleted: true, at: new Date().toLocaleDateString('ko-KR') };
  showToast('💾 삭제 중...');
  await saveUserData(d);
  showToast('🗑️ 삭제 완료!');
  selectApt(DATA.find(a => a.name === aptName) || currentApt);
}
async function clearMyData() {
  if (!currentApt || !confirm(currentApt.name + '\n내 입력 데이터를 모두 삭제할까요?')) return;
  const d = _cachedUserData;

// ===== 날짜 정렬 (연도 포함) =====
const MONTH_ORDER = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
function sortDates(keys) {
  return [...keys].sort((a, b) => {
    // 형식: "2021년_3월-01" 또는 구형 "3월-01"
    const parseKey = k => {
      const yearMatch = k.match(/^(\d{4})년_(.+)$/);
      if (yearMatch) {
        const [,yr, rest] = yearMatch;
        const [mon, wk] = rest.split('-');
        return [parseInt(yr), MONTH_ORDER.indexOf(mon), parseInt(wk)];
      }
      const [mon, wk] = k.split('-');
      return [2021, MONTH_ORDER.indexOf(mon), parseInt(wk)];
    };
    const [ay, am, aw] = parseKey(a);
    const [by, bm, bw] = parseKey(b);
    if (ay !== by) return ay - by;
    if (am !== bm) return am - bm;
    return aw - bw;
  });
}
function fmtKey(k) {
  const m = k.match(/^(\d{4})년_(.+)$/);
  return m ? m[1]+'년 '+m[2] : k;
}

let chart = null;
let activeRegion = 'all';
let filteredData = [...DATA];

function fmt(v) { return v ? (v/10000).toFixed(2)+'억' : '-'; }
function getLatestPrice(apt, type) {
  const keys = sortDates(Object.keys(apt[type]));
  return keys.length ? apt[type][keys[keys.length-1]] : null;
}
function getChange(apt, type) {
  const keys = sortDates(Object.keys(apt[type]));
  if (keys.length < 2) return null;
  const first = apt[type][keys[0]], last = apt[type][keys[keys.length-1]];
  return ((last - first) / first * 100).toFixed(1);
}

// ===== 내보내기 / 가져오기 =====
function exportData() {
  const d = _cachedUserData;
  if (!Object.keys(d).length) {
    showToast('⚠️ 저장된 입력 데이터가 없어요');
    return;
  }
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `아파트시세_입력데이터_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 내보내기 완료!');
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const imported = JSON.parse(e.target.result);
      const existing = _cachedUserData;
      let addedCount = 0;
      Object.entries(imported).forEach(([aptName, entries]) => {
        if (!existing[aptName]) existing[aptName] = {};
        Object.entries(entries).forEach(([date, val]) => {
          existing[aptName][date] = val;
          addedCount++;
        });
      });
      showToast('💾 저장 중...');
      await saveUserData(existing);
      showToast(`📥 가져오기 완료! ${addedCount}개 항목 반영`);
      if (currentApt) selectApt(currentApt);
    } catch(err) {
      showToast('❌ 파일 형식이 올바르지 않아요');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== 아파트 수정/삭제 =====
function openEditAptModal() {
  if (!currentApt) return;
  document.getElementById('editAptRegion').value = currentApt.region;
  document.getElementById('editAptArea').value = currentApt.area;
  document.getElementById('editAptName').value = currentApt.name;
  document.getElementById('editAptSize').value = currentApt.size;
  document.getElementById('editAptModal').classList.add('open');
}
function closeEditAptModal() {
  document.getElementById('editAptModal').classList.remove('open');
}
function saveEditApt() {
  if (!currentApt) return;
  const newRegion = document.getElementById('editAptRegion').value;
  const newArea = document.getElementById('editAptArea').value.trim();
  const newName = document.getElementById('editAptName').value.trim();
  const newSize = document.getElementById('editAptSize').value.trim();
  if (!newName) { showToast('⚠️ 아파트명을 입력해주세요'); return; }

  // 커스텀 아파트인 경우 localStorage도 업데이트
  const customs = loadCustomApts();
  const ci = customs.findIndex(a => a.name === currentApt.name);

  // DATA에서 찾아서 수정
  const di = DATA.findIndex(a => a.name === currentApt.name);
  if (di !== -1) {
    DATA[di].region = newRegion;
    DATA[di].area = newArea;
    DATA[di].name = newName;
    DATA[di].size = newSize;
  }

  if (ci !== -1) {
    customs[ci].region = newRegion;
    customs[ci].area = newArea;
    customs[ci].name = newName;
    customs[ci].size = newSize;
    saveCustomApts(customs);
  }

  closeEditAptModal();
  showToast('✅ 아파트 정보 수정 완료!');
  currentApt = DATA[di];
  renderAptList();
  renderRanking();
  selectApt(currentApt);
}

function deleteApt() {
  if (!currentApt) return;
  if (!confirm(`"${currentApt.name}"\n이 아파트를 목록에서 삭제할까요?`)) return;

  // 커스텀 아파트면 localStorage에서도 삭제
  const customs = loadCustomApts();
  const ci = customs.findIndex(a => a.name === currentApt.name);
  if (ci !== -1) {
    customs.splice(ci, 1);
    saveCustomApts(customs);
  }

  // DATA에서 삭제
  const di = DATA.findIndex(a => a.name === currentApt.name);
  if (di !== -1) DATA.splice(di, 1);

  currentApt = null;
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('rankingView').style.display = 'block';
  showToast('🗑️ 아파트 삭제 완료!');
  renderAptList();
  renderRanking();
}

// ===== 아파트 추가 =====
const APT_ADD_KEY = 'apt_tracker_custom_v1';

function loadCustomApts() {
  try { return JSON.parse(localStorage.getItem(APT_ADD_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveCustomApts(arr) {
  localStorage.setItem(APT_ADD_KEY, JSON.stringify(arr));
}

// 앱 시작 시 커스텀 아파트를 DATA에 병합
function mergeCustomApts() {
  const customs = loadCustomApts();
  customs.forEach(apt => {
    if (!DATA.find(d => d.name === apt.name)) {
      DATA.push(apt);
    }
  });
}

function openAddAptModal() {
  document.getElementById('newAptName').value = '';
  document.getElementById('newAptArea').value = '';
  document.getElementById('newAptSize').value = '';
  document.getElementById('addAptModal').classList.add('open');
  setTimeout(() => document.getElementById('newAptName').focus(), 100);
}
function closeAddAptModal() {
  document.getElementById('addAptModal').classList.remove('open');
}

function saveNewApt() {
  const name = document.getElementById('newAptName').value.trim();
  const region = document.getElementById('newAptRegion').value;
  const area = document.getElementById('newAptArea').value.trim();
  const size = document.getElementById('newAptSize').value.trim();

  if (!name) { showToast('⚠️ 아파트명을 입력해주세요'); return; }
  if (!area) { showToast('⚠️ 지역을 입력해주세요'); return; }
  if (DATA.find(d => d.name === name)) { showToast('⚠️ 이미 등록된 아파트예요'); return; }

  const newApt = { region, area, name, size: size || '?평', '매매': {}, '전세': {}, _custom: true };
  const customs = loadCustomApts();
  customs.push(newApt);
  saveCustomApts(customs);
  DATA.push(newApt);

  closeAddAptModal();
  showToast('✅ ' + name.slice(0,15) + '... 추가 완료!');
  renderAptList();
  renderRanking();
  selectApt(newApt);
}

// ===== Init =====
document.getElementById('searchInput').addEventListener('input', renderAptList);
document.getElementById('regionFilters').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeRegion = e.target.dataset.region;
    currentApt = null;
    document.getElementById('rankingView').style.display = 'block';
    document.getElementById('detailView').style.display = 'none';
    renderAptList();
  }
});
document.getElementById('modalCancelBtn').addEventListener('click', closeUpdateModal);
document.getElementById('modalSaveBtn').addEventListener('click', saveEntry);
document.getElementById('updateModal').addEventListener('click', e => { if (e.target === document.getElementById('updateModal')) closeUpdateModal(); });
document.getElementById('addAptCancelBtn').addEventListener('click', closeAddAptModal);
document.getElementById('addAptSaveBtn').addEventListener('click', saveNewApt);
document.getElementById('addAptModal').addEventListener('click', e => { if (e.target === document.getElementById('addAptModal')) closeAddAptModal(); });

// 앱 시작: 일단 localStorage로 즉시 렌더링 후 구글 시트 데이터로 업데이트
(async () => {
  // 1단계: localStorage 데이터로 즉시 화면 표시
  try { _cachedUserData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { _cachedUserData = {}; }
  mergeCustomApts();
  renderAptList();
  renderRanking();

  // 2단계: 구글 시트에서 최신 데이터 로드 후 업데이트
  showToast('🔄 구글 시트 동기화 중...');
  _cachedUserData = await loadUserData();
  renderAptList();
  renderRanking();
  if (currentApt) selectApt(currentApt);
  showToast(_gsLoaded ? '✅ 구글 시트 연동 완료!' : '⚠️ 오프라인 모드 (로컬 데이터)');
})();
</script>
